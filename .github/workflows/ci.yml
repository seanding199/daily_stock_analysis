# CI 流程 - Pull Request 自动检测
# 仅在 PR 运行，main 分支由 docker-publish 执行发布构建

name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'setup.cfg'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'docker-compose.yml'

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== 核心检查（必须通过）====================
  check:
    name: ✅ 代码检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
      
      - name: 🐍 语法检查
        run: |
          python -m py_compile main.py src/config.py src/analyzer.py src/notification.py
          python -m py_compile src/storage.py src/scheduler.py src/search_service.py
          python -m py_compile src/market_analyzer.py src/stock_analyzer.py
          python -m py_compile data_provider/*.py
          echo "✅ Python 语法检查通过"
      
      - name: 🔎 静态分析 (严重错误)
        run: |
          # 只检查严重错误：语法错误、未定义变量等
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: ✅ 模块导入测试
        run: |
          python -c "from src.config import get_config; print('✅ config')"
          python -c "from src.storage import DatabaseManager; print('✅ storage')"
          python -c "from src.notification import NotificationService; print('✅ notification')"
          python -c "from data_provider import DataFetcherManager; print('✅ data_provider')"
          python -c "from src.analyzer import AIAnalyzer; print('✅ analyzer')"
          echo "✅ 所有模块导入成功"

  # ==================== Docker 构建测试 ====================
  docker:
    name: 🐳 Docker 构建
    runs-on: ubuntu-latest
    needs: [check]
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐳 构建镜像
        run: |
          docker build -t stock-analysis:test -f docker/Dockerfile .
          docker run --rm stock-analysis:test python -c "print('✅ Docker OK')"
